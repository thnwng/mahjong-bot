name: Deploy Edge Functions

# Deploys the Supabase Edge Functions straight from git whenever they change.
# This is the ONLY deploy path — never paste code into the dashboard editor
# (if code isn't in git, it isn't deployed).
#
# Needs one repo secret: SUPABASE_ACCESS_TOKEN
#   (supabase.com -> account Settings -> Access Tokens -> Generate new token,
#    then GitHub repo Settings -> Secrets and variables -> Actions -> New secret)

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Type-check both functions before deploying anything. The Next.js
      # tsconfig excludes supabase/, so this is the only type check this
      # money-handling code gets.
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type-check functions
        run: |
          deno check supabase/functions/track/index.ts
          deno check supabase/functions/bot/index.ts

      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy track + bot
        run: |
          supabase functions deploy track --project-ref oybilfaofgekcscaoovg
          supabase functions deploy bot --project-ref oybilfaofgekcscaoovg
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
