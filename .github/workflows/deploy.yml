name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Engine tests (payout + scoring money math)
        run: npm test
      - name: Build static export
        run: npm run build
        env:
          # Project Pages serve under /<repo>; basePath must match.
          NEXT_PUBLIC_BASE_PATH: /mahjong-bot
          # Group-sync backend (Supabase track function URL) + bot deep link.
          # Set these as repo variables: Settings -> Secrets and variables -> Actions -> Variables.
          NEXT_PUBLIC_TRACK_URL: ${{ vars.TRACK_URL }}
          NEXT_PUBLIC_BOT_APP_LINK: ${{ vars.BOT_APP_LINK }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
